<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Should I Buy This? Privacy Policy</title>
    <meta name="description" content="Privacy Policy for the Should I Buy This? browser extension." />
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8f3;
        --card: #fffdf6;
        --ink: #1f2937;
        --muted: #5b6472;
        --line: #e6ddc9;
        --accent: #0f766e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 0% 0%, #efe9d7 0, transparent 34%),
          radial-gradient(circle at 100% 20%, #e2f1ee 0, transparent 28%),
          var(--bg);
        line-height: 1.65;
      }

      .wrap {
        width: min(900px, calc(100% - 2rem));
        margin: 3rem auto;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: clamp(1rem, 2vw, 2rem);
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }

      .top {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 1rem;
        margin-bottom: 1rem;
      }

      .brand {
        margin: 0;
        font-size: clamp(1.5rem, 3vw, 2rem);
      }

      .meta {
        margin: 0;
        color: var(--muted);
        font-size: 0.95rem;
      }

      #content h1,
      #content h2,
      #content h3 {
        line-height: 1.25;
      }

      #content a {
        color: var(--accent);
      }

      #status {
        color: var(--muted);
      }

      @media (max-width: 640px) {
        .wrap {
          margin: 1rem auto;
        }

        .top {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <div class="top">
          <h1 class="brand">Should I Buy This?</h1>
          <p class="meta">Privacy Policy</p>
        </div>
        <p id="status">Loading policy...</p>
        <article id="content" aria-live="polite"></article>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      async function loadPolicy() {
        const status = document.getElementById('status');
        const content = document.getElementById('content');

        try {
          const response = await fetch('./PRIVACY.md', { cache: 'no-store' });
          if (!response.ok) {
            throw new Error('Failed to load policy markdown');
          }

          const markdown = await response.text();
          content.innerHTML = marked.parse(markdown);
          status.remove();
        } catch (error) {
          status.textContent = 'Unable to load privacy policy at this time.';
          console.error(error);
        }
      }

      void loadPolicy();
    </script>
  </body>
</html>
